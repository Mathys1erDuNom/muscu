<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Nutrition</title>
  <link rel="stylesheet" href="nutrition.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet"/>
</head>
<body>

  <header>
    <div class="header-inner">
      <a href="index.html" class="back-link">← Séances</a>
      <span class="tag">MON CARNET</span>
      <h1>NUTRITION</h1>
    </div>
  </header>

  <main>

    <!-- SAISIE DU JOUR -->
    <section class="card" id="form-section">
      <h2>Journée</h2>

      <div class="form-group">
        <label for="date">Date</label>
        <input type="date" id="date"/>
      </div>

      <!-- AJOUTE ICI -->
      <div class="form-group poids-group">
        <label for="poids">Poids du jour</label>
        <div class="macro-input-wrap" style="max-width:160px">
          <input type="number" id="poids" placeholder="0.0" min="30" max="300" step="0.1"/>
          <span class="unit">kg</span>
        </div>
      </div>

      <!-- APPORTS -->
      <div class="section-title">Apport calorique</div>

      <div class="macro-grid">
        <div class="macro-cell">
          <label for="calories">Calories</label>
          <div class="macro-input-wrap">
            <input type="number" id="calories" placeholder="0" min="0"/>
            <span class="unit">kcal</span>
          </div>
        </div>
        <div class="macro-cell">
          <label for="proteines">Protéines</label>
          <div class="macro-input-wrap">
            <input type="number" id="proteines" placeholder="0" min="0" step="0.1"/>
            <span class="unit">g</span>
          </div>
        </div>
        <div class="macro-cell">
          <label for="glucides">Glucides</label>
          <div class="macro-input-wrap">
            <input type="number" id="glucides" placeholder="0" min="0" step="0.1"/>
            <span class="unit">g</span>
          </div>
        </div>
        <div class="macro-cell">
          <label for="lipides">Lipides</label>
          <div class="macro-input-wrap">
            <input type="number" id="lipides" placeholder="0" min="0" step="0.1"/>
            <span class="unit">g</span>
          </div>
        </div>
      </div>

      <!-- DÉPENSES -->
      <div class="section-title" style="margin-top:1.4rem">Dépenses cardio</div>

      <div id="cardio-list"></div>
      <button class="btn-secondary" id="ajouter-cardio">+ Ajouter une activité</button>

      <!-- OBJECTIF CALORIQUE -->
      <div class="objectif-bar" id="objectif-bar">
        <div class="objectif-label">
          <span>Objectif journalier</span>
          <button class="btn-edit-objectif" id="btn-edit-objectif" title="Modifier l'objectif">✎</button>
        </div>
        <div class="objectif-display" id="objectif-display">
          <span id="objectif-valeur">2000</span> kcal
        </div>
        <div class="objectif-edit hidden" id="objectif-edit">
          <div class="macro-input-wrap" style="max-width:160px">
            <input type="number" id="objectif-input" min="500" max="10000" step="50" placeholder="2000"/>
            <span class="unit">kcal</span>
          </div>
          <button class="btn-secondary" id="btn-save-objectif">OK</button>
        </div>
        <div class="objectif-progress-wrap" id="objectif-progress-wrap">
          <div class="objectif-progress-bar" id="objectif-progress-bar"></div>
        </div>
        <div class="objectif-reste" id="objectif-reste"></div>
      </div>

      <!-- BILAN LIVE -->
      <div class="bilan" id="bilan">
        <div class="bilan-row">
          <span>Apport</span>
          <span id="bilan-apport">— kcal</span>
        </div>
        <div class="bilan-row depense">
          <span>Dépense cardio</span>
          <span id="bilan-depense">— kcal</span>
        </div>
        <div class="bilan-sep"></div>
        <div class="bilan-row net" id="bilan-net-row">
          <span>Net</span>
          <span id="bilan-net">— kcal</span>
        </div>
      </div>

      <div class="form-group" style="margin-top:1rem">
        <label for="notes">Notes</label>
        <textarea id="notes" rows="2" placeholder="Remarques, repas, ressenti…"></textarea>
      </div>

      <button class="btn-primary" id="sauvegarder">Enregistrer la journée</button>
      <p id="status-msg"></p>
    </section>

    <!-- HISTORIQUE -->
    <section class="card">
      <h2>Historique</h2>
      <div id="dernier-jour"></div>
      <hr class="dernier-sep"/>
      <div class="date-nav">
        <button class="btn-secondary nav-arrow" id="hist-prev">←</button>
        <select id="hist-picker" style="flex:1"></select>
        <button class="btn-secondary nav-arrow" id="hist-next">→</button>
      </div>
      <div id="historique-detail"></div>
    </section>

    <!-- GRAPHIQUE POIDS -->
    <section class="card" id="poids-section">
      <h2>Évolution du poids</h2>
      <div id="poids-empty" class="empty-msg" style="display:none">Pas encore de données.</div>
      <div id="poids-stats" class="poids-stats" style="display:none">
        <div class="poids-stat-item">
          <span class="poids-stat-val" id="stat-actuel">—</span>
          <span class="poids-stat-lbl">actuel</span>
        </div>
        <div class="poids-stat-item">
          <span class="poids-stat-val" id="stat-min">—</span>
          <span class="poids-stat-lbl">min</span>
        </div>
        <div class="poids-stat-item">
          <span class="poids-stat-val" id="stat-max">—</span>
          <span class="poids-stat-lbl">max</span>
        </div>
        <div class="poids-stat-item">
          <span class="poids-stat-val" id="stat-diff">—</span>
          <span class="poids-stat-lbl">évolution</span>
        </div>
      </div>
      <canvas id="poids-chart" style="width:100%;margin-top:1rem"></canvas>
    </section>

  </main>

  <footer><p>© 2026 Carnet Muscu</p></footer>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>

  <script>
    const API_URL = '';
    let poidsChartInstance = null;

    // ─── OBJECTIF ────────────────────────────────────────────
    const OBJECTIF_KEY = 'muscu_objectif_cal';
    let objectifCal = parseInt(localStorage.getItem(OBJECTIF_KEY)) || 2000;

    function afficherObjectif() {
      document.getElementById('objectif-valeur').textContent = objectifCal;
      document.getElementById('objectif-input').value = objectifCal;
      majObjectifProgress();
    }

    function majObjectifProgress() {
      const apport = +document.getElementById('calories').value || 0;
      const pct = objectifCal > 0 ? Math.min(apport / objectifCal * 100, 100) : 0;
      const bar = document.getElementById('objectif-progress-bar');
      const reste = document.getElementById('objectif-reste');
      const wrap = document.getElementById('objectif-progress-wrap');

      bar.style.width = pct + '%';
      bar.className = 'objectif-progress-bar';
      if (pct >= 100) bar.classList.add('over');
      else if (pct >= 85) bar.classList.add('warn');

      if (apport > 0) {
        const diff = objectifCal - apport;
        wrap.style.display = '';
        if (diff > 0) {
          reste.textContent = `Reste ${diff} kcal`;
          reste.className = 'objectif-reste reste-ok';
        } else {
          reste.textContent = `Dépassement de ${Math.abs(diff)} kcal`;
          reste.className = 'objectif-reste reste-over';
        }
      } else {
        wrap.style.display = 'none';
        reste.textContent = '';
      }
    }

    document.getElementById('btn-edit-objectif').addEventListener('click', () => {
      document.getElementById('objectif-display').classList.toggle('hidden');
      document.getElementById('objectif-edit').classList.toggle('hidden');
      document.getElementById('objectif-input').focus();
    });

    document.getElementById('btn-save-objectif').addEventListener('click', () => {
      const val = parseInt(document.getElementById('objectif-input').value);
      if (val >= 500 && val <= 10000) {
        objectifCal = val;
        localStorage.setItem(OBJECTIF_KEY, objectifCal);
        afficherObjectif();
      }
      document.getElementById('objectif-display').classList.remove('hidden');
      document.getElementById('objectif-edit').classList.add('hidden');
    });

    document.getElementById('objectif-input').addEventListener('keydown', e => {
      if (e.key === 'Enter') document.getElementById('btn-save-objectif').click();
      if (e.key === 'Escape') {
        document.getElementById('objectif-display').classList.remove('hidden');
        document.getElementById('objectif-edit').classList.add('hidden');
      }
    });

    afficherObjectif();
    document.getElementById('objectif-progress-wrap').style.display = 'none';

    document.getElementById('date').valueAsDate = new Date();

    // ─── BILAN LIVE ──────────────────────────────────────────
    function majBilan() {
      const apport  = +document.getElementById('calories').value || 0;
      const depense = Array.from(document.querySelectorAll('.cardio-cal'))
                           .reduce((s, el) => s + (+el.value || 0), 0);
      const net = apport - depense;

      document.getElementById('bilan-apport').textContent  = apport  ? `${apport} kcal`  : '— kcal';
      document.getElementById('bilan-depense').textContent = depense ? `−${depense} kcal` : '— kcal';
      document.getElementById('bilan-net').textContent     = apport  ? `${net} kcal`      : '— kcal';

      const netRow = document.getElementById('bilan-net-row');
      netRow.classList.remove('positif','negatif');
      if (apport) netRow.classList.add(net >= 0 ? 'positif' : 'negatif');

      majObjectifProgress();
    }

    document.getElementById('calories').addEventListener('input', majBilan);

    // ─── CARDIO ──────────────────────────────────────────────
    function creerLigneCardio() {
      const div = document.createElement('div');
      div.className = 'cardio-row';
      div.innerHTML = `
        <input type="text"   class="cardio-nom" placeholder="Activité (ex: Course, Vélo…)"/>
        <div class="cardio-right">
          <input type="number" class="cardio-cal" placeholder="kcal" min="0"/>
          <span class="unit">kcal</span>
          <button class="btn-remove" title="Supprimer">✕</button>
        </div>
      `;
      div.querySelector('.btn-remove').addEventListener('click', () => { div.remove(); majBilan(); });
      div.querySelector('.cardio-cal').addEventListener('input', majBilan);
      return div;
    }

    document.getElementById('ajouter-cardio').addEventListener('click', () => {
      document.getElementById('cardio-list').appendChild(creerLigneCardio());
    });

    // ─── SAUVEGARDER ─────────────────────────────────────────
    document.getElementById('sauvegarder').addEventListener('click', async () => {
      const date      = document.getElementById('date').value;
      const calories  = +document.getElementById('calories').value || 0;
      const proteines = +document.getElementById('proteines').value || 0;
      const glucides  = +document.getElementById('glucides').value  || 0;
      const lipides   = +document.getElementById('lipides').value   || 0;
      const notes     = document.getElementById('notes').value.trim();
      const statusEl  = document.getElementById('status-msg');

      if (!date) {
        statusEl.textContent = '⚠ Sélectionne une date.';
        statusEl.className = 'msg-error';
        return;
      }

      const cardio = [];
      document.querySelectorAll('.cardio-row').forEach(row => {
        const nom = row.querySelector('.cardio-nom').value.trim();
        const cal = +row.querySelector('.cardio-cal').value || 0;
        if (nom || cal) cardio.push({ nom, calories: cal });
      });

      const depense_totale = cardio.reduce((s, a) => s + a.calories, 0);
      const net = calories - depense_totale;

      const poids = +document.getElementById('poids').value || null;
      const payload = { date, calories, proteines, glucides, lipides, poids, cardio, depense_totale, net, notes };

      statusEl.textContent = 'Enregistrement…';
      statusEl.className = '';

      try {
        const res = await fetch(`${API_URL}/nutrition`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });
        if (!res.ok) throw new Error();
        statusEl.textContent = '✓ Journée enregistrée !';
        statusEl.className = 'msg-ok';
        // Reset
        ['calories','proteines','glucides','lipides'].forEach(id => document.getElementById(id).value = '');
        document.getElementById('notes').value = '';
        document.getElementById('cardio-list').innerHTML = '';
        document.getElementById('date').valueAsDate = new Date();
        document.getElementById('poids').value = '';
        majBilan();
        chargerHistorique();
      } catch(e) {
        statusEl.textContent = '✗ Impossible de contacter le serveur.';
        statusEl.className = 'msg-error';
      }
    });

    // ─── HISTORIQUE ──────────────────────────────────────────
    async function chargerHistorique() {
      const picker  = document.getElementById('hist-picker');
      const detail  = document.getElementById('historique-detail');
      const prevBtn = document.getElementById('hist-prev');
      const nextBtn = document.getElementById('hist-next');

      try {
        const res = await fetch(`${API_URL}/nutrition`);
        if (!res.ok) throw new Error();
        const jours = await res.json();
        afficherGraphiquePoids(jours);

        // ─── DERNIER JOUR ────────────────────────────────────
        const dernier = jours[0];
        const joursDiff = dernier ? Math.floor(
          (new Date().setHours(0,0,0,0) - new Date(dernier.date).setHours(0,0,0,0))
          / (1000 * 60 * 60 * 24)
        ) : null;
        const labelJours = joursDiff === 0 ? "Aujourd'hui"
          : joursDiff === 1 ? "Il y a 1 jour"
          : `Il y a ${joursDiff} jours`;

        document.getElementById('dernier-jour').innerHTML = dernier ? `
          <div class="dernier-card">
            <div class="dernier-header">
              <div>
                <span class="dernier-label">Dernière journée</span>
                <span class="dernier-when">${labelJours}</span>
              </div>
              <span class="dernier-date">${new Date(dernier.date).toLocaleDateString('fr-FR', { day:'2-digit', month:'long', year:'numeric' })}</span>
            </div>
            <div class="macros-row" style="margin-top:10px">
              <div class="macro-badge apport">
                <span class="macro-val">${dernier.calories}</span>
                <span class="macro-lbl">kcal</span>
              </div>
              <div class="macro-badge prot">
                <span class="macro-val">${dernier.proteines}g</span>
                <span class="macro-lbl">protéines</span>
              </div>
              <div class="macro-badge gluc">
                <span class="macro-val">${dernier.glucides}g</span>
                <span class="macro-lbl">glucides</span>
              </div>
              <div class="macro-badge lip">
                <span class="macro-val">${dernier.lipides}g</span>
                <span class="macro-lbl">lipides</span>
              </div>
            </div>
            <div class="net-line ${dernier.net >= 0 ? 'net-pos' : 'net-neg'}" style="margin-top:8px">
              Net : ${dernier.net >= 0 ? '+' : ''}${dernier.net} kcal
              ${dernier.depense_totale ? `<span class="depense-detail">(−${dernier.depense_totale} kcal dépensés)</span>` : ''}
            </div>
            ${dernier.notes ? `<p class="dernier-notes">${dernier.notes}</p>` : ''}
          </div>
        ` : '';

        if (!jours.length) {
          picker.innerHTML = '<option>Aucune journée</option>';
          detail.innerHTML = '<p class="empty-msg">Aucune journée enregistrée.</p>';
          return;
        }

        // ─── MENU SÉLECTEUR ──────────────────────────────────
        picker.innerHTML = jours.map((j, i) => {
          const d = new Date(j.date).toLocaleDateString('fr-FR', { weekday:'short', day:'2-digit', month:'short', year:'numeric' });
          return `<option value="${i}">${d} — ${j.calories} kcal</option>`;
        }).join('');

        function renderDetail(idx) {
          picker.value = idx;
          prevBtn.disabled = idx <= 0;
          nextBtn.disabled = idx >= jours.length - 1;

          const j = jours[idx];
          const netClass = j.net >= 0 ? 'net-pos' : 'net-neg';
          detail.innerHTML = `
            <div class="jour-item">
              <div class="jour-header">
                <span class="jour-date">${new Date(j.date).toLocaleDateString('fr-FR', { weekday:'short', day:'2-digit', month:'short', year:'numeric' })}</span>
                <button class="btn-remove btn-suppr" data-id="${j.id}" title="Supprimer">✕</button>
              </div>
              <div class="macros-row">
                <div class="macro-badge apport">
                  <span class="macro-val">${j.calories}</span>
                  <span class="macro-lbl">kcal apport</span>
                </div>
                <div class="macro-badge prot">
                  <span class="macro-val">${j.proteines}g</span>
                  <span class="macro-lbl">protéines</span>
                </div>
                <div class="macro-badge gluc">
                  <span class="macro-val">${j.glucides}g</span>
                  <span class="macro-lbl">glucides</span>
                </div>
                <div class="macro-badge lip">
                  <span class="macro-val">${j.lipides}g</span>
                  <span class="macro-lbl">lipides</span>
                </div>
              </div>
              ${j.cardio?.length ? `
                <div class="cardio-hist">
                  ${j.cardio.map(a => `
                    <span class="cardio-pill">🏃 ${a.nom}${a.calories ? ` · −${a.calories} kcal` : ''}</span>
                  `).join('')}
                </div>` : ''}
              <div class="net-line ${netClass}">
                Net : ${j.net >= 0 ? '+' : ''}${j.net} kcal
                ${j.depense_totale ? `<span class="depense-detail">(−${j.depense_totale} kcal dépensés)</span>` : ''}
              </div>
              ${j.notes ? `<p class="jour-notes">${j.notes}</p>` : ''}
            </div>
          `;

          detail.querySelector('.btn-suppr')?.addEventListener('click', async () => {
            if (!confirm('Supprimer cette journée ?')) return;
            await fetch(`${API_URL}/nutrition/${j.id}`, { method: 'DELETE' });
            chargerHistorique();
          });
        }

        let currentIdx = 0;
        renderDetail(0);

        picker.addEventListener('change', () => {
          currentIdx = +picker.value;
          renderDetail(currentIdx);
        });
        prevBtn.addEventListener('click', () => { if (currentIdx > 0) renderDetail(--currentIdx); });
        nextBtn.addEventListener('click', () => { if (currentIdx < jours.length - 1) renderDetail(++currentIdx); });

      } catch(e) {
        document.getElementById('historique-detail').innerHTML =
          '<p class="empty-msg msg-error">Impossible de charger l\'historique.</p>';
      }
    }

    ///////////
    function afficherGraphiquePoids(jours) {
      const points = jours
        .filter(j => j.poids != null && j.poids > 0)
        .map(j => ({ x: j.date.slice(0,10), y: parseFloat(j.poids) }))
        .sort((a, b) => a.x.localeCompare(b.x));

      const section = document.getElementById('poids-section');
      const emptyEl = document.getElementById('poids-empty');
      const statsEl = document.getElementById('poids-stats');
      const canvas  = document.getElementById('poids-chart');

      if (!points.length) {
        emptyEl.style.display = '';
        statsEl.style.display = 'none';
        canvas.style.display  = 'none';
        return;
      }

      emptyEl.style.display = 'none';
      statsEl.style.display = '';
      canvas.style.display  = '';

      // Stats
      const vals   = points.map(p => p.y);
      const actuel = vals[vals.length - 1];
      const min    = Math.min(...vals);
      const max    = Math.max(...vals);
      const diff   = +(actuel - vals[0]).toFixed(1);

      document.getElementById('stat-actuel').textContent = actuel + ' kg';
      document.getElementById('stat-min').textContent    = min    + ' kg';
      document.getElementById('stat-max').textContent    = max    + ' kg';
      document.getElementById('stat-diff').textContent   = (diff >= 0 ? '+' : '') + diff + ' kg';
      document.getElementById('stat-diff').style.color   = diff <= 0 ? '#4caf7d' : '#e07b39';

      // Graphique
      if (poidsChartInstance) poidsChartInstance.destroy();

      const ctx = canvas.getContext('2d');
      poidsChartInstance = new Chart(ctx, {
        type: 'line',
        data: {
          labels: points.map(p => new Date(p.x).toLocaleDateString('fr-FR', { day:'2-digit', month:'short' })),
          datasets: [{
            data: points.map(p => p.y),
            borderColor: '#e07b39',
            backgroundColor: 'rgba(224,123,57,0.08)',
            borderWidth: 2,
            pointRadius: 4,
            pointBackgroundColor: '#e07b39',
            tension: 0.3,
            fill: true
          }]
        },
        options: {
          responsive: true,
          plugins: {
            legend: { display: false },
            tooltip: {
              callbacks: {
                label: ctx => ctx.parsed.y + ' kg'
              }
            }
          },
          scales: {
            x: {
              grid: { display: false },
              ticks: { font: { size: 11 }, color: '#999' }
            },
            y: {
              grid: { color: 'rgba(0,0,0,0.05)' },
              ticks: {
                font: { size: 11 }, color: '#999',
                callback: v => v + ' kg'
              },
              suggestedMin: Math.min(...vals) - 1,
              suggestedMax: Math.max(...vals) + 1
            }
          }
        }
      });
    }

    ////////
    
    chargerHistorique();
  </script>
</body>
</html>
